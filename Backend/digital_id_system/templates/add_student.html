{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}
{% block content %}
<div class="bg-gradient-to-br from-indigo-50 to-white p-8 rounded-xl shadow-lg max-w-xl mx-auto mt-8">
    <h2 class="text-2xl font-bold mb-6 text-indigo-700">Add New Student</h2>
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">First Name</label>
                <input type="text" name="first_name" class="form-control w-full bg-white border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Last Name</label>
                <input type="text" name="last_name" class="form-control w-full bg-white border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" required>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" class="form-control w-full bg-white border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-400" required>
        </div>
        {{ form.as_p }}
        <p class="text-xs text-gray-500 mt-2">Username and password will be the registration number. Student can update password after login.</p>
        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded shadow">Add Student</button>
    </form>
</div>
{% endblock %}
