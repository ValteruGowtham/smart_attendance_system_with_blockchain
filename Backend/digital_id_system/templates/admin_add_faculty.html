{% extends 'base.html' %}
{% block title %}Add Faculty (Admin){% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl font-bold mb-4">Add Faculty (Admin)</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded mt-2">Add Faculty</button>
    </form>
    {% if messages %}
        <div class="mt-4">
            {% for message in messages %}
                <div class="p-2 rounded bg-green-100 text-green-800">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
</div>
{% endblock %}
