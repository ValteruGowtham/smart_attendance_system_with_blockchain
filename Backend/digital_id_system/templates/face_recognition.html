{% extends 'base.html' %}
{% block title %}Face Recognition Attendance{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-2xl font-bold mb-4">Face Recognition Attendance</h2>
  <form id="attendanceForm" method="post">
    {% csrf_token %}
    <div class="mb-2">
      <label>Branch:</label>
      <input type="text" name="branch" class="border p-2 rounded w-full" required>
    </div>
    <div class="mb-2">
      <label>Year:</label>
      <input type="text" name="year" class="border p-2 rounded w-full" required>
    </div>
    <div class="mb-2">
      <label>Section:</label>
      <input type="text" name="section" class="border p-2 rounded w-full" required>
    </div>
    <div class="mb-2">
      <label>Period:</label>
      <input type="text" name="period" class="border p-2 rounded w-full" required>
    </div>
    <div class="mb-4">
      <label>Camera:</label><br>
      <video id="video" width="320" height="240" autoplay class="border"></video>
      <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
      <button type="button" id="captureBtn" class="bg-indigo-600 text-white px-3 py-1 rounded mt-2">Capture</button>
    </div>
    <input type="hidden" name="image_data" id="image_data">
    <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded">Submit Attendance</button>
  </form>
  {% if result %}
    <div class="mt-4 p-2 bg-green-100 text-green-800 rounded">{{ result }}</div>
  {% endif %}
</div>
<script>
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const captureBtn = document.getElementById('captureBtn');
  const imageDataInput = document.getElementById('image_data');
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => { video.srcObject = stream; })
    .catch(err => { alert('Camera error: ' + err); });
  captureBtn.onclick = function() {
    canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
    const dataUrl = canvas.toDataURL('image/png');
    imageDataInput.value = dataUrl;
    alert('Image captured! Now submit the form.');
  };
</script>
{% endblock %}
